name: PR ClickUp Validation

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-clickup-link:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title and description for ClickUp reference
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          ticket_pattern='CU-[A-Za-z0-9]+'
          clickup_url_pattern='https://app\.clickup\.com/t/[A-Za-z0-9]+'

          echo "Validating PR title and body for ClickUp ticket linkage..."

          if ! echo "$PR_TITLE" | grep -Eq "$ticket_pattern"; then
            echo "ERROR: PR title must include a ClickUp ticket id (example: CU-XXXXXXXX)."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

          if ! echo "$PR_BODY" | grep -Eq "$ticket_pattern"; then
            echo "ERROR: PR body must include a ClickUp ticket id (example: CU-XXXXXXXX)."
            exit 1
          fi

          if ! echo "$PR_BODY" | grep -Eq "$clickup_url_pattern"; then
            echo "ERROR: PR body must include a ClickUp task URL (example: https://app.clickup.com/t/XXXXXXXX)."
            exit 1
          fi

          echo "ClickUp validation passed."
